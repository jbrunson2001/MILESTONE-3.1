<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc">
  <title id="title">Browsers and their browser engines</title>
  <desc id="desc">Chrome, Edge, Brave, and Opera use Blink. Safari uses WebKit. Firefox uses Gecko.</desc>
  <rect width="1000" height="430" fill="#f7f7f7"/>
  <g font-family="Arial, sans-serif">
    <text x="500" y="45" text-anchor="middle" font-size="30" font-weight="bold" fill="#111111">Browsers and Browser Engines</text>

    <rect x="60" y="90" width="260" height="270" rx="10" fill="#fff3c4" stroke="#7a5700" stroke-width="4"/>
    <text x="190" y="132" text-anchor="middle" font-size="28" font-weight="bold">Blink</text>
    <text x="90" y="180" font-size="22">• Google Chrome</text>
    <text x="90" y="220" font-size="22">• Microsoft Edge</text>
    <text x="90" y="260" font-size="22">• Brave</text>
    <text x="90" y="300" font-size="22">• Opera</text>

    <rect x="370" y="90" width="260" height="270" rx="10" fill="#111111" stroke="#ffc629" stroke-width="5"/>
    <text x="500" y="132" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffc629">WebKit</text>
    <text x="410" y="205" font-size="24" fill="#ffffff">• Safari</text>
    <text x="410" y="250" font-size="19" fill="#ffffff">• Apple web views</text>

    <rect x="680" y="90" width="260" height="270" rx="10" fill="#fff3c4" stroke="#7a5700" stroke-width="4"/>
    <text x="810" y="132" text-anchor="middle" font-size="28" font-weight="bold">Gecko</text>
    <text x="720" y="215" font-size="24">• Firefox</text>
    <text x="720" y="260" font-size="19">• GeckoView apps</text>
  </g>
</svg>
