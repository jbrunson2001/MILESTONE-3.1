<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" role="img" aria-labelledby="title desc">
  <title id="title">Basic browser rendering process</title>
  <desc id="desc">A user request goes to a web server. The server sends HTML, CSS, and JavaScript to the browser engine, which displays a page.</desc>
  <rect width="980" height="300" fill="#f7f7f7"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="30" y="95" width="160" height="90" rx="8" fill="#111111" stroke="#ffc629" stroke-width="5"/>
    <text x="110" y="132" font-size="24" font-weight="bold" fill="#ffc629">User</text>
    <text x="110" y="163" font-size="18" fill="#ffffff">enters a URL</text>

    <line x1="190" y1="140" x2="275" y2="140" stroke="#7a5700" stroke-width="5"/>
    <polygon points="275,140 257,129 257,151" fill="#7a5700"/>

    <rect x="280" y="70" width="180" height="140" rx="8" fill="#fff3c4" stroke="#7a5700" stroke-width="4"/>
    <text x="370" y="115" font-size="24" font-weight="bold" fill="#111111">Web Server</text>
    <text x="370" y="150" font-size="18" fill="#111111">sends files</text>
    <text x="370" y="178" font-size="17" fill="#111111">HTML • CSS • JS</text>

    <line x1="460" y1="140" x2="545" y2="140" stroke="#7a5700" stroke-width="5"/>
    <polygon points="545,140 527,129 527,151" fill="#7a5700"/>

    <rect x="550" y="70" width="190" height="140" rx="8" fill="#111111" stroke="#ffc629" stroke-width="5"/>
    <text x="645" y="112" font-size="23" font-weight="bold" fill="#ffc629">Browser Engine</text>
    <text x="645" y="148" font-size="17" fill="#ffffff">parses and lays out</text>
    <text x="645" y="177" font-size="17" fill="#ffffff">the page content</text>

    <line x1="740" y1="140" x2="825" y2="140" stroke="#7a5700" stroke-width="5"/>
    <polygon points="825,140 807,129 807,151" fill="#7a5700"/>

    <rect x="830" y="95" width="120" height="90" rx="8" fill="#fff3c4" stroke="#7a5700" stroke-width="4"/>
    <text x="890" y="132" font-size="22" font-weight="bold" fill="#111111">Page</text>
    <text x="890" y="162" font-size="17" fill="#111111">on screen</text>
  </g>
</svg>